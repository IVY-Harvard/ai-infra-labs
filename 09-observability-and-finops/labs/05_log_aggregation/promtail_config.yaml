# ============================================================
# Promtail 配置 — GPU 推理日志采集 (DaemonSet)
# ============================================================
# Promtail 在每个节点上运行, 采集:
#   1. vLLM 容器日志 (推理请求/调度/错误)
#   2. 系统日志 (GPU XID Error, OOM Kill)
#   3. NVIDIA 驱动日志
#   4. Kubernetes 事件日志
#
# 关键设计:
#   - 结构化解析: 提取 request_id, trace_id, prompt_tokens 等字段
#   - 多行合并: Python traceback 合并为单条日志
#   - Label 优化: 避免高基数 label 导致 Loki 性能问题
#   - 采样策略: DEBUG 日志按比例采样, ERROR 100% 保留
# ============================================================

---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail
  namespace: logging
  labels:
    app: promtail
spec:
  selector:
    matchLabels:
      app: promtail
  template:
    metadata:
      labels:
        app: promtail
    spec:
      serviceAccountName: promtail
      tolerations:
        # 允许在 GPU 节点上运行 (通常有 taint)
        - key: "nvidia.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"
      containers:
        - name: promtail
          image: grafana/promtail:2.9.4
          args:
            - "-config.file=/etc/promtail/promtail.yaml"
            - "-client.external-labels=cluster=gpu-prod-01,region=cn-east"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: config
              mountPath: /etc/promtail
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: varlibdockercontainers
              mountPath: /var/lib/docker/containers
              readOnly: true
            - name: run
              mountPath: /run/promtail
          env:
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          ports:
            - containerPort: 3101
              name: http-metrics
      volumes:
        - name: config
          configMap:
            name: promtail-config
        - name: varlog
          hostPath:
            path: /var/log
        - name: varlibdockercontainers
          hostPath:
            path: /var/lib/docker/containers
        - name: run
          hostPath:
            path: /run/promtail

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: logging
data:
  promtail.yaml: |
    # ==========================
    # Server
    # ==========================
    server:
      http_listen_port: 3101
      grpc_listen_port: 0
      log_level: info

    # ==========================
    # Client (推送到 Loki)
    # ==========================
    clients:
      - url: http://loki-write.logging:3100/loki/api/v1/push
        tenant_id: inference     # 多租户: inference 团队
        batchwait: 1s
        batchsize: 1048576       # 1MB batch
        timeout: 10s
        backoff_config:
          min_period: 500ms
          max_period: 5m
          max_retries: 10
        external_labels:
          cluster: gpu-prod-01

    # ==========================
    # Positions (断点续传)
    # ==========================
    positions:
      filename: /run/promtail/positions.yaml

    # ==========================
    # Scrape Configs (采集规则)
    # ==========================
    scrape_configs:

      # ================================================
      # 1. vLLM 容器日志 (最核心)
      # ================================================
      - job_name: vllm-inference
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          # 只采集 inference namespace 的 vllm 容器
          - source_labels: [__meta_kubernetes_namespace]
            regex: inference
            action: keep
          - source_labels: [__meta_kubernetes_pod_container_name]
            regex: vllm
            action: keep
          # 提取有用的 Kubernetes label
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: pod
          - source_labels: [__meta_kubernetes_namespace]
            target_label: namespace
          - source_labels: [__meta_kubernetes_pod_node_name]
            target_label: node
          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: app
          - source_labels: [__meta_kubernetes_pod_label_model]
            target_label: model
          # 日志路径映射
          - source_labels:
              - __meta_kubernetes_pod_uid
              - __meta_kubernetes_pod_container_name
            target_label: __path__
            separator: /
            replacement: /var/log/pods/*$1/$2/*.log

        pipeline_stages:
          # --- Stage 1: Docker/CRI 日志格式解析 ---
          - cri: {}

          # --- Stage 2: 多行合并 (Python traceback) ---
          # Python traceback 跨多行, 需要合并为单条日志:
          #   Traceback (most recent call last):
          #     File "engine.py", line 123
          #   RuntimeError: CUDA out of memory
          - multiline:
              firstline: '^\d{4}-\d{2}-\d{2}|^{"timestamp"'
              max_wait_time: 3s
              max_lines: 50

          # --- Stage 3: JSON 日志解析 ---
          # vLLM 默认输出 JSON 格式日志 (如果配置了 structured logging)
          - json:
              expressions:
                level: level
                message: message
                timestamp: timestamp
                request_id: request_id
                trace_id: trace_id
                prompt_tokens: prompt_tokens
                output_tokens: output_tokens
                ttft_ms: ttft_ms
                tpot_ms: tpot_ms
                model: model
                error_type: error_type

          # --- Stage 4: 正则解析 (非 JSON 日志 fallback) ---
          - regex:
              expression: >-
                ^(?P<timestamp>\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2},\d{3})
                \s+(?P<level>\w+)
                \s+(?P<logger>[\w.]+)
                \s+(?P<message>.*)$

          # --- Stage 5: 从日志内容中提取结构化字段 ---
          # 提取 request_id (vLLM 日志中的请求标识)
          - regex:
              source: message
              expression: 'request[_-]id[=: ]+(?P<request_id>[a-zA-Z0-9-]+)'

          # 提取 trace_id (OpenTelemetry TraceID)
          - regex:
              source: message
              expression: 'trace[_-]id[=: ]+(?P<trace_id>[a-f0-9]{32})'

          # 提取 KV Cache 使用率
          - regex:
              source: message
              expression: 'cache[_ ]usage[=: ]+(?P<cache_usage>[\d.]+)'

          # 提取 CUDA 错误信息
          - regex:
              source: message
              expression: '(?P<cuda_error>CUDA (?:error|out of memory|runtime error)[^"]*)'

          # --- Stage 6: Label 设置 ---
          - labels:
              level:
              # 注意: 不要把 request_id 设为 label (高基数!)
              # request_id 应该放在 structured metadata 中

          # --- Stage 7: Structured Metadata (Loki 3.0+) ---
          # 低基数字段做 label, 高基数字段做 structured metadata
          - structured_metadata:
              request_id:
              trace_id:

          # --- Stage 8: 时间戳解析 ---
          - timestamp:
              source: timestamp
              format: "2006-01-02T15:04:05.000Z"
              fallback_formats:
                - "2006-01-02 15:04:05,000"
                - "2006-01-02T15:04:05Z"

          # --- Stage 9: 日志级别过滤与采样 ---
          # DEBUG 日志在生产环境按 10% 采样
          - match:
              selector: '{level="DEBUG"}'
              stages:
                - sampling:
                    rate: 0.1  # 10% 采样

          # ERROR 和 CRITICAL 添加特殊标记 (便于告警)
          - match:
              selector: '{level=~"ERROR|CRITICAL"}'
              stages:
                - labels:
                    severity: critical_log

          # --- Stage 10: 输出格式化 ---
          - output:
              source: message

      # ================================================
      # 2. 系统日志 (GPU XID Error, OOM Kill)
      # ================================================
      - job_name: syslog-gpu
        static_configs:
          - targets: [localhost]
            labels:
              job: syslog
              __path__: /var/log/syslog

        pipeline_stages:
          # 只保留 GPU 相关的系统日志
          - match:
              selector: '{job="syslog"}'
              stages:
                - regex:
                    expression: >-
                      (?P<timestamp>\w{3}\s+\d{1,2}\s+\d{2}:\d{2}:\d{2})
                      \s+(?P<hostname>\S+)
                      \s+(?P<process>\S+):
                      \s+(?P<message>.*)

                # 只保留 NVIDIA/GPU 相关日志
                - match:
                    selector: '{job="syslog"} |~ "(?i)(nvrm|nvidia|gpu|xid|ecc|nvlink|nccl|oom.*kill)"'
                    stages:
                      - labels:
                          hostname:

                # 过滤掉不相关的系统日志
                - drop:
                    expression: '(?i)^(?!.*(nvrm|nvidia|gpu|xid|ecc|nvlink|nccl|oom.*kill))'
                    drop_counter_reason: "non-gpu-syslog"

          # 提取 XID Error 详情
          - regex:
              source: message
              expression: 'Xid.*?:\s+(?P<xid_code>\d+)'
          - regex:
              source: message
              expression: 'GPU (?P<gpu_id>\d+)'
          - structured_metadata:
              xid_code:
              gpu_id:

      # ================================================
      # 3. NVIDIA Driver 日志 (dmesg)
      # ================================================
      - job_name: dmesg-gpu
        static_configs:
          - targets: [localhost]
            labels:
              job: dmesg
              __path__: /var/log/dmesg

        pipeline_stages:
          - match:
              selector: '{job="dmesg"} |~ "(?i)(nvidia|nvrm|gpu|pci.*10de)"'
              stages:
                - regex:
                    expression: '\[\s*(?P<kernel_ts>[\d.]+)\]\s+(?P<message>.*)'
                - labels:
                    source: dmesg

      # ================================================
      # 4. Kubernetes Events (Pod 生命周期)
      # ================================================
      - job_name: kubernetes-events
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_namespace]
            regex: inference
            action: keep
          - source_labels: [__meta_kubernetes_pod_container_name]
            regex: event-exporter
            action: keep
        pipeline_stages:
          - json:
              expressions:
                reason: reason
                message: message
                involved_object: involvedObject.name
                event_type: type
          - labels:
              reason:
              event_type:
          - match:
              selector: '{reason=~"OOMKilling|Evicted|BackOff|Failed"}'
              stages:
                - labels:
                    severity: k8s_critical

---
# ============================================================
# Promtail RBAC
# ============================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: promtail
  namespace: logging

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: promtail
rules:
  - apiGroups: [""]
    resources: ["nodes", "services", "pods", "endpoints"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: promtail
subjects:
  - kind: ServiceAccount
    name: promtail
    namespace: logging
roleRef:
  kind: ClusterRole
  name: promtail
  apiGroup: rbac.authorization.k8s.io
