# ============================================================
# Grafana Loki 部署配置 — GPU 推理日志聚合
# ============================================================
# 部署模式: Simple Scalable (适合中等规模)
#   - Read path: Querier + Query Frontend
#   - Write path: Distributor + Ingester
#   - Backend: Compactor + Object Store (MinIO)
#
# 容量设计 (8×H20 集群, 16 节点):
#   - 日志写入: ~50 MB/s (INFO 级别)
#   - 保留期: 30 天
#   - 存储预估: 50 MB/s × 86400s × 30d × 0.1(压缩) ≈ 13 TB
# ============================================================

---
apiVersion: v1
kind: Namespace
metadata:
  name: logging
  labels:
    app.kubernetes.io/part-of: observability

---
# ============================================================
# Loki ConfigMap
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: logging
data:
  loki.yaml: |
    # ==========================
    # Authentication (多租户)
    # ==========================
    auth_enabled: true  # 按团队隔离日志

    # ==========================
    # Server
    # ==========================
    server:
      http_listen_port: 3100
      grpc_listen_port: 9096
      log_level: info
      grpc_server_max_recv_msg_size: 16777216  # 16MB (大日志行)

    # ==========================
    # Distributor
    # ==========================
    distributor:
      ring:
        kvstore:
          store: memberlist

    # ==========================
    # Ingester
    # ==========================
    ingester:
      lifecycler:
        ring:
          kvstore:
            store: memberlist
          replication_factor: 3  # 3 副本保障数据安全
      chunk_idle_period: 30m
      chunk_block_size: 262144
      chunk_retain_period: 1m
      max_transfer_retries: 0
      wal:
        enabled: true
        dir: /loki/wal

    # ==========================
    # Schema & Storage
    # ==========================
    schema_config:
      configs:
        - from: 2024-01-01
          store: tsdb
          object_store: s3
          schema: v13
          index:
            prefix: loki_index_
            period: 24h

    storage_config:
      tsdb_shipper:
        active_index_directory: /loki/index
        cache_location: /loki/cache
      aws:
        endpoint: minio.logging:9000
        bucketnames: loki-chunks
        access_key_id: ${MINIO_ACCESS_KEY}
        secret_access_key: ${MINIO_SECRET_KEY}
        insecure: true
        s3forcepathstyle: true

    # ==========================
    # Compactor
    # ==========================
    compactor:
      working_directory: /loki/compactor
      compaction_interval: 10m
      retention_enabled: true
      retention_delete_delay: 2h
      retention_delete_worker_count: 150

    # ==========================
    # Limits (性能与安全)
    # ==========================
    limits_config:
      # 写入限制
      ingestion_rate_mb: 100        # 100 MB/s per tenant
      ingestion_burst_size_mb: 200
      per_stream_rate_limit: 10MB   # 单 stream 10 MB/s
      per_stream_rate_limit_burst: 20MB

      # 查询限制
      max_query_parallelism: 32
      max_query_series: 5000
      max_entries_limit_per_query: 50000
      max_query_length: 721h        # 最长查 30 天

      # 保留期
      retention_period: 720h        # 30 天

      # Label 限制
      max_label_name_length: 1024
      max_label_value_length: 2048
      max_label_names_per_series: 30

      # 结构化元数据 (存储 trace_id 等)
      allow_structured_metadata: true

    # ==========================
    # Query Frontend
    # ==========================
    frontend:
      max_outstanding_per_tenant: 256
      compress_responses: true

    # ==========================
    # Ruler (基于日志的告警)
    # ==========================
    ruler:
      storage:
        type: local
        local:
          directory: /loki/rules
      rule_path: /loki/rules-temp
      alertmanager_url: http://alertmanager.monitoring:9093
      ring:
        kvstore:
          store: memberlist
      enable_api: true

    # ==========================
    # Memberlist (节点发现)
    # ==========================
    memberlist:
      join_members:
        - loki-memberlist.logging:7946

---
# ============================================================
# Loki StatefulSet (Write Path: Ingester)
# ============================================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: loki-ingester
  namespace: logging
spec:
  serviceName: loki-ingester
  replicas: 3
  selector:
    matchLabels:
      app: loki
      component: ingester
  template:
    metadata:
      labels:
        app: loki
        component: ingester
    spec:
      containers:
        - name: loki
          image: grafana/loki:2.9.4
          args:
            - "-config.file=/etc/loki/loki.yaml"
            - "-target=ingester"
          ports:
            - containerPort: 3100
              name: http
            - containerPort: 9096
              name: grpc
            - containerPort: 7946
              name: memberlist
          resources:
            requests:
              cpu: "1000m"
              memory: "4Gi"
            limits:
              cpu: "4000m"
              memory: "8Gi"
          volumeMounts:
            - name: config
              mountPath: /etc/loki
            - name: data
              mountPath: /loki
          readinessProbe:
            httpGet:
              path: /ready
              port: 3100
            initialDelaySeconds: 15
          env:
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: loki-minio-secret
                  key: access_key
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: loki-minio-secret
                  key: secret_key
      volumes:
        - name: config
          configMap:
            name: loki-config
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: fast-ssd
        resources:
          requests:
            storage: 50Gi

---
# ============================================================
# Loki Deployment (Read Path: Querier + Frontend)
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki-read
  namespace: logging
spec:
  replicas: 3
  selector:
    matchLabels:
      app: loki
      component: read
  template:
    metadata:
      labels:
        app: loki
        component: read
    spec:
      containers:
        - name: loki
          image: grafana/loki:2.9.4
          args:
            - "-config.file=/etc/loki/loki.yaml"
            - "-target=read"
          ports:
            - containerPort: 3100
              name: http
            - containerPort: 9096
              name: grpc
            - containerPort: 7946
              name: memberlist
          resources:
            requests:
              cpu: "1000m"
              memory: "4Gi"
            limits:
              cpu: "4000m"
              memory: "8Gi"
          volumeMounts:
            - name: config
              mountPath: /etc/loki
          env:
            - name: MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: loki-minio-secret
                  key: access_key
            - name: MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: loki-minio-secret
                  key: secret_key
      volumes:
        - name: config
          configMap:
            name: loki-config

---
# ============================================================
# Loki Services
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: loki-write
  namespace: logging
spec:
  ports:
    - port: 3100
      name: http
    - port: 9096
      name: grpc
  selector:
    app: loki
    component: ingester

---
apiVersion: v1
kind: Service
metadata:
  name: loki-read
  namespace: logging
spec:
  ports:
    - port: 3100
      name: http
    - port: 9096
      name: grpc
  selector:
    app: loki
    component: read

---
apiVersion: v1
kind: Service
metadata:
  name: loki-memberlist
  namespace: logging
spec:
  clusterIP: None
  ports:
    - port: 7946
      name: memberlist
  selector:
    app: loki

---
# ============================================================
# Loki Recording Rules (基于日志的指标)
# ============================================================
# 从日志中提取结构化指标 → 补充 Prometheus 覆盖不到的维度
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-rules
  namespace: logging
data:
  gpu-inference-rules.yaml: |
    groups:
      # 从 vLLM 日志中提取错误率 (按错误类型细分)
      - name: inference_log_metrics
        interval: 1m
        rules:
          - record: inference:log_errors:rate1m
            expr: |
              sum by (namespace, pod, error_type) (
                rate({namespace="inference"} |= "ERROR" | json | line_format "{{.error_type}}" [1m])
              )

          # XID Error 发生频率 (从系统日志中)
          - record: gpu:xid_errors:rate5m
            expr: |
              sum by (node) (
                rate({job="syslog"} |~ "NVRM.*Xid" [5m])
              )

      # 基于日志的告警
      - name: inference_log_alerts
        rules:
          - alert: CUDAOutOfMemory
            expr: |
              count_over_time({namespace="inference", container="vllm"}
                |= "CUDA out of memory" [5m]) > 0
            for: 0s
            labels:
              severity: critical
            annotations:
              summary: "vLLM CUDA OOM detected in logs"

          - alert: NCCLTimeout
            expr: |
              count_over_time({namespace="inference", container="vllm"}
                |~ "NCCL.*timeout|watchdog.*timeout" [5m]) > 0
            for: 0s
            labels:
              severity: critical
            annotations:
              summary: "NCCL communication timeout detected"

          - alert: GPUXidErrorInSyslog
            expr: |
              count_over_time({job="syslog"} |~ "NVRM.*Xid.*(?:31|48|63|79)" [5m]) > 0
            for: 0s
            labels:
              severity: critical
            annotations:
              summary: "Critical GPU XID Error detected in system log"
