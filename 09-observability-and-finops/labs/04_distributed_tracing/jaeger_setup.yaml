# ============================================================
# Jaeger + OpenTelemetry Collector 完整部署
# ============================================================
# 适用场景: Kubernetes 集群部署的 GPU 推理服务追踪
#
# 组件说明:
#   1. OpenTelemetry Collector — 接收、处理、导出 traces
#   2. Jaeger — 存储和可视化 traces
#   3. ServiceMonitor — 让 Prometheus 采集 Collector 自身指标
#
# 数据流:
#   vLLM (OTLP gRPC) → OTel Collector → Jaeger (存储)
#                                     → Prometheus (trace metrics)
# ============================================================

---
# ============================================================
# 1. Namespace
# ============================================================
apiVersion: v1
kind: Namespace
metadata:
  name: observability
  labels:
    app.kubernetes.io/part-of: inference-platform

---
# ============================================================
# 2. OpenTelemetry Collector ConfigMap
# ============================================================
# Collector 是追踪数据的 "交通枢纽":
# - 接收: 来自 vLLM 的 OTLP gRPC/HTTP traces
# - 处理: 属性注入、尾部采样、batch
# - 导出: 到 Jaeger (存储) + Prometheus (指标化)
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: observability
data:
  collector.yaml: |
    # ============================
    # Receivers: 数据入口
    # ============================
    receivers:
      # OTLP gRPC — vLLM SDK 默认使用的协议
      otlp:
        protocols:
          grpc:
            endpoint: "0.0.0.0:4317"
            # 推理 trace 的 span 可能很大 (含多个 decode step events)
            max_recv_msg_size_mib: 16
          http:
            endpoint: "0.0.0.0:4318"

    # ============================
    # Processors: 数据处理
    # ============================
    processors:
      # --- 内存限制: 防止 Collector 自身 OOM ---
      memory_limiter:
        check_interval: 5s
        limit_mib: 2048        # 最大使用 2GB 内存
        spike_limit_mib: 512   # 允许 spike

      # --- Batch: 批量发送提高效率 ---
      batch:
        send_batch_size: 512
        send_batch_max_size: 1024
        timeout: 5s

      # --- 属性处理: 统一添加环境信息 ---
      attributes:
        actions:
          # 添加集群标识 (便于多集群查询)
          - key: "deployment.cluster"
            value: "gpu-cluster-prod-01"
            action: upsert
          # 添加环境标签
          - key: "deployment.environment"
            value: "production"
            action: upsert

      # --- 资源检测: 自动注入 K8s 信息 ---
      k8sattributes:
        auth_type: "serviceAccount"
        extract:
          metadata:
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.namespace.name
            - k8s.node.name
            - k8s.deployment.name
          labels:
            - tag_name: app
              key: app
              from: pod
            - tag_name: model
              key: serving.kubeflow.org/model
              from: pod
        pod_association:
          - sources:
              - from: resource_attribute
                name: k8s.pod.ip

      # --- 尾部采样: 基于完成的 trace 决定是否保留 ---
      # 这是 GPU 推理追踪的关键优化:
      # - 慢请求 (TTFT > 5s): 100% 保留
      # - 有 preemption 的请求: 100% 保留
      # - 错误请求: 100% 保留
      # - 正常请求: 10% 采样
      tail_sampling:
        decision_wait: 30s     # 等待 30s 确认 trace 完成
        num_traces: 100000     # 内存中最多保持 10 万条待决策 trace
        policies:
          # Policy 1: 错误请求全量保留
          - name: error-policy
            type: status_code
            status_code:
              status_codes:
                - ERROR

          # Policy 2: 慢请求保留 (TTFT > 5s 或 E2E > 30s)
          - name: slow-request-policy
            type: latency
            latency:
              threshold_ms: 5000  # span 持续时间 > 5s

          # Policy 3: 有 preemption 事件的保留
          - name: preemption-policy
            type: string_attribute
            string_attribute:
              key: "scheduler.preempted"
              values: ["true"]

          # Policy 4: KV Cache 高压力时的请求保留
          - name: high-cache-pressure-policy
            type: numeric_attribute
            numeric_attribute:
              key: "kv_cache.gpu_usage_pct"
              min_value: 90

          # Policy 5: 默认按比例采样
          - name: default-sampling
            type: probabilistic
            probabilistic:
              sampling_percentage: 10

      # --- Span Metrics: 从 traces 生成 RED metrics ---
      # 这样 Prometheus 可以查询 trace 导出的指标
      spanmetrics:
        metrics_exporter: prometheus
        dimensions:
          - name: gen_ai.request.model
          - name: inference.finish_reason
          - name: kv_cache.pressure
        histogram:
          explicit:
            buckets: [5ms, 10ms, 25ms, 50ms, 100ms, 250ms, 500ms, 1s, 2.5s, 5s, 10s]

    # ============================
    # Exporters: 数据出口
    # ============================
    exporters:
      # --- Jaeger: Trace 存储和可视化 ---
      otlp/jaeger:
        endpoint: "jaeger-collector.observability:4317"
        tls:
          insecure: true

      # --- Prometheus: Span 指标导出 ---
      prometheus:
        endpoint: "0.0.0.0:8889"
        namespace: "traces"
        resource_to_telemetry_conversion:
          enabled: true

      # --- Debug: 开发环境使用 ---
      # logging:
      #   loglevel: debug

    # ============================
    # Extensions
    # ============================
    extensions:
      # 健康检查
      health_check:
        endpoint: "0.0.0.0:13133"
      # 性能分析 (排障用)
      pprof:
        endpoint: "0.0.0.0:1888"
      # zPages (内部调试 UI)
      zpages:
        endpoint: "0.0.0.0:55679"

    # ============================
    # Service: 组装 Pipeline
    # ============================
    service:
      extensions: [health_check, pprof, zpages]
      pipelines:
        traces:
          receivers: [otlp]
          processors:
            - memory_limiter
            - k8sattributes
            - attributes
            - tail_sampling
            - spanmetrics
            - batch
          exporters: [otlp/jaeger, prometheus]
      telemetry:
        logs:
          level: "info"
        metrics:
          address: "0.0.0.0:8888"

---
# ============================================================
# 3. OTel Collector Deployment
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: observability
  labels:
    app: otel-collector
spec:
  replicas: 2  # 高可用: 2 副本
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8888"
    spec:
      serviceAccountName: otel-collector
      containers:
        - name: collector
          image: otel/opentelemetry-collector-contrib:0.96.0
          args:
            - "--config=/conf/collector.yaml"
          ports:
            - containerPort: 4317   # OTLP gRPC
              name: otlp-grpc
            - containerPort: 4318   # OTLP HTTP
              name: otlp-http
            - containerPort: 8888   # Collector 自身 metrics
              name: metrics
            - containerPort: 8889   # Span metrics (Prometheus)
              name: span-metrics
            - containerPort: 13133  # Health check
              name: health
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "4Gi"   # 尾部采样需要较多内存
          volumeMounts:
            - name: config
              mountPath: /conf
          livenessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 13133
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: config
          configMap:
            name: otel-collector-config

---
# ============================================================
# 4. OTel Collector Service
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: observability
  labels:
    app: otel-collector
spec:
  type: ClusterIP
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
    - name: otlp-http
      port: 4318
      targetPort: 4318
    - name: metrics
      port: 8888
      targetPort: 8888
    - name: span-metrics
      port: 8889
      targetPort: 8889
  selector:
    app: otel-collector

---
# ============================================================
# 5. OTel Collector ServiceAccount + RBAC
#    (用于 k8sattributes processor)
# ============================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: otel-collector
  namespace: observability

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: otel-collector
rules:
  - apiGroups: [""]
    resources: ["pods", "namespaces", "nodes"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: otel-collector
subjects:
  - kind: ServiceAccount
    name: otel-collector
    namespace: observability
roleRef:
  kind: ClusterRole
  name: otel-collector
  apiGroup: rbac.authorization.k8s.io

---
# ============================================================
# 6. Jaeger All-in-One (开发/小规模生产)
# ============================================================
# 生产建议: 使用 Jaeger Operator + Elasticsearch 后端
# 这里用 all-in-one 简化部署演示
# ============================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  namespace: observability
  labels:
    app: jaeger
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jaeger
  template:
    metadata:
      labels:
        app: jaeger
    spec:
      containers:
        - name: jaeger
          image: jaegertracing/all-in-one:1.54
          env:
            # 使用 Badger 持久化存储 (生产用 ES/Cassandra)
            - name: SPAN_STORAGE_TYPE
              value: "badger"
            - name: BADGER_EPHEMERAL
              value: "false"
            - name: BADGER_DIRECTORY_VALUE
              value: "/badger/data"
            - name: BADGER_DIRECTORY_KEY
              value: "/badger/key"
            # 内存限制
            - name: GOMAXPROCS
              value: "4"
            # 采样策略 (服务端采样 — 与客户端 tail sampling 配合)
            - name: SAMPLING_STRATEGIES_FILE
              value: "/etc/jaeger/sampling.json"
            # 查询服务配置
            - name: QUERY_MAX_CLOCK_SKEW_ADJUSTMENT
              value: "5s"
          ports:
            - containerPort: 16686  # Jaeger UI
              name: ui
            - containerPort: 4317   # OTLP gRPC
              name: otlp-grpc
            - containerPort: 14269  # Admin/Health
              name: admin
          resources:
            requests:
              cpu: "500m"
              memory: "2Gi"
            limits:
              cpu: "2000m"
              memory: "8Gi"
          volumeMounts:
            - name: badger-storage
              mountPath: /badger
            - name: sampling-config
              mountPath: /etc/jaeger
          livenessProbe:
            httpGet:
              path: /
              port: 14269
            initialDelaySeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 14269
            initialDelaySeconds: 5
      volumes:
        - name: badger-storage
          persistentVolumeClaim:
            claimName: jaeger-storage
        - name: sampling-config
          configMap:
            name: jaeger-sampling

---
# ============================================================
# 7. Jaeger PVC (持久化 trace 数据)
# ============================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jaeger-storage
  namespace: observability
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Gi  # 生产建议 500Gi+
  storageClassName: fast-ssd  # 使用 SSD (Badger 需要高 IOPS)

---
# ============================================================
# 8. Jaeger Service
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: jaeger-collector
  namespace: observability
  labels:
    app: jaeger
spec:
  type: ClusterIP
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
  selector:
    app: jaeger

---
apiVersion: v1
kind: Service
metadata:
  name: jaeger-query
  namespace: observability
  labels:
    app: jaeger
spec:
  type: ClusterIP
  ports:
    - name: ui
      port: 16686
      targetPort: 16686
  selector:
    app: jaeger

---
# ============================================================
# 9. Jaeger Sampling 策略
# ============================================================
# 定义不同服务的采样率 (服务端采样, 配合 Collector tail sampling)
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: jaeger-sampling
  namespace: observability
data:
  sampling.json: |
    {
      "service_strategies": [
        {
          "service": "vllm-inference",
          "type": "probabilistic",
          "param": 0.1,
          "operation_strategies": [
            {
              "operation": "inference.request",
              "type": "probabilistic",
              "param": 0.1
            },
            {
              "operation": "model.prefill",
              "type": "probabilistic",
              "param": 0.2
            },
            {
              "operation": "engine.step",
              "type": "probabilistic",
              "param": 0.01
            }
          ]
        },
        {
          "service": "api-gateway",
          "type": "probabilistic",
          "param": 0.05
        }
      ],
      "default_strategy": {
        "type": "probabilistic",
        "param": 0.1
      }
    }

---
# ============================================================
# 10. ServiceMonitor (让 Prometheus 采集 OTel Collector 指标)
# ============================================================
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: otel-collector
  namespace: observability
  labels:
    app: otel-collector
spec:
  selector:
    matchLabels:
      app: otel-collector
  endpoints:
    # Collector 自身运行指标
    - port: metrics
      interval: 15s
      path: /metrics
    # Span-derived metrics (从 trace 生成的 RED 指标)
    - port: span-metrics
      interval: 15s
      path: /metrics

---
# ============================================================
# 11. Grafana DataSource (Jaeger)
# ============================================================
# 在 Grafana 中配置 Jaeger 数据源, 实现 Metrics → Trace 下钻
# ============================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasource-jaeger
  namespace: observability
  labels:
    grafana_datasource: "true"
data:
  jaeger-datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Jaeger
        type: jaeger
        access: proxy
        url: http://jaeger-query.observability:16686
        isDefault: false
        jsonData:
          tracesToMetrics:
            datasourceUid: prometheus
            tags:
              - key: "gen_ai.request.model"
                value: "model"
              - key: "inference.finish_reason"
                value: "finish_reason"
            queries:
              - name: "TTFT for this model"
                query: "histogram_quantile(0.99, sum by (le) (rate(vllm:time_to_first_token_seconds_bucket{model=\"$${__tags.model}\"}[5m])))"
              - name: "KV Cache Usage"
                query: "vllm:gpu_cache_usage_perc"
          tracesToLogs:
            datasourceUid: loki
            tags: ["k8s.pod.name"]
            mappedTags:
              - key: "k8s.pod.name"
                value: "pod"
            filterByTraceID: true
            filterBySpanID: true
          nodeGraph:
            enabled: true
        editable: true

---
# ============================================================
# 12. HPA for OTel Collector (基于队列长度自动扩缩)
# ============================================================
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: otel-collector-hpa
  namespace: observability
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: otel-collector
  minReplicas: 2
  maxReplicas: 8
  metrics:
    # 基于 Collector 自身的 span 接收速率扩缩
    - type: Pods
      pods:
        metric:
          name: otelcol_receiver_accepted_spans
        target:
          type: AverageValue
          averageValue: "10000"  # 每个 Collector Pod 处理 10K spans/s
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 120
