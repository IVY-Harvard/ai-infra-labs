# ============================================================
# 容量规划层告警规则 (提前 N 小时预警)
# ============================================================
# 目标: 基于趋势预测未来容量瓶颈，提前触发扩容/优化
# 响应团队: ML Platform + Capacity Planning
# 特点: 使用 predict_linear / deriv 做趋势预测
# ============================================================

apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: capacity-planning-alerts
  namespace: inference
  labels:
    app: vllm
    component: capacity-planning
    team: ml-platform
    prometheus: kube-prometheus
spec:
  groups:
    # =========================================================
    # Group 1: KV Cache 容量趋势预测
    # =========================================================
    - name: capacity.kv_cache_forecast
      interval: 60s
      rules:
        # ---------------------------------------------------------
        # 预测: KV Cache 1小时内将满
        # 使用 predict_linear 基于过去 30 分钟趋势外推
        # ---------------------------------------------------------
        - alert: KVCacheWillBeFullIn1Hour
          expr: |
            predict_linear(vllm:gpu_cache_usage_perc[30m], 3600) > 0.95
            AND
            vllm:gpu_cache_usage_perc > 0.7
          for: 10m
          labels:
            severity: warning
            team: ml-platform
            category: capacity-forecast
            forecast_horizon: 1h
          annotations:
            summary: "预测: KV Cache 1小时内将达到 95%"
            description: |
              实例 {{ $labels.instance }}
              当前 KV Cache 使用率: {{ with printf "vllm:gpu_cache_usage_perc{instance='%s'}" $labels.instance | query }}{{ . | first | value | humanizePercentage }}{{ end }}
              预测 1 小时后: > 95%

              趋势分析:
              - 基于过去 30 分钟使用率线性外推
              - 当前使用率已 > 70% 且持续增长

              建议操作 (提前处理):
              1. 检查流量趋势 — 是否进入高峰期
              2. 预热备用实例准备接管
              3. 考虑提前触发 HPA 扩容
              4. 调整 prefix cache 策略减少淘汰

              公式:
              predict_linear(metric[30m], 3600)
              = current_value + slope_30m × 3600
            runbook_url: "https://wiki.internal/runbooks/kv-cache-forecast"

        # ---------------------------------------------------------
        # 预测: KV Cache 15分钟内将满 (更紧急)
        # ---------------------------------------------------------
        - alert: KVCacheWillBeFullIn15Min
          expr: |
            predict_linear(vllm:gpu_cache_usage_perc[10m], 900) > 0.95
            AND
            vllm:gpu_cache_usage_perc > 0.85
          for: 5m
          labels:
            severity: critical
            team: ml-platform
            category: capacity-forecast
            forecast_horizon: 15m
            pager: "true"
          annotations:
            summary: "紧急预测: KV Cache 15分钟内将满!"
            description: |
              实例 {{ $labels.instance }}
              KV Cache 快速增长，预计 15 分钟内达到 95%。
              当前已 > 85%，增长速度很快。

              紧急措施:
              1. 立即对新请求限流
              2. 触发快速扩容 (如有预热实例)
              3. 拒绝长 prompt 请求 (> 4K tokens)
              4. 临时降低 max_num_seqs
            impact: "15分钟后服务将显著降级"
            runbook_url: "https://wiki.internal/runbooks/kv-cache-forecast-urgent"

    # =========================================================
    # Group 2: 吞吐量趋势预测
    # =========================================================
    - name: capacity.throughput_forecast
      interval: 60s
      rules:
        # ---------------------------------------------------------
        # 吞吐量持续下降趋势
        # 检测: 吞吐在过去 30 分钟持续下降
        # ---------------------------------------------------------
        - alert: ThroughputDecliningTrend
          expr: |
            deriv(
              rate(vllm:generation_tokens_total[5m])[30m:]
            ) < -10
            AND
            rate(vllm:generation_tokens_total[5m]) > 100
          for: 10m
          labels:
            severity: warning
            team: ml-platform
            category: capacity-trend
          annotations:
            summary: "吞吐量持续下降中: 斜率 {{ $value | humanize }} tokens/s²"
            description: |
              实例 {{ $labels.instance }}
              吞吐量在过去 30 分钟持续下降。
              变化率: {{ $value | humanize }} tokens/s 每秒

              可能的原因:
              1. 负载逐渐增加 → batch 变大 → 单请求变慢
              2. KV Cache 逐渐填满 → preemption 增多
              3. GPU 逐渐升温 → throttle 逐渐加重
              4. 内存碎片化逐渐严重

              建议:
              - 关联检查 KV Cache 使用率趋势
              - 检查 GPU 温度趋势
              - 确认请求长度分布是否变化
            runbook_url: "https://wiki.internal/runbooks/throughput-declining"

        # ---------------------------------------------------------
        # 请求到达速率超过处理能力
        # ---------------------------------------------------------
        - alert: RequestArrivalExceedsCapacity
          expr: |
            rate(vllm:request_success_total[5m]) + rate(vllm:request_failure_total[5m])
            > 1.2 * (
              rate(vllm:generation_tokens_total[5m]) / 500
            )
          for: 10m
          labels:
            severity: warning
            team: ml-platform
            category: capacity-demand
          annotations:
            summary: "请求到达速率超过处理能力 20%+"
            description: |
              实例 {{ $labels.instance }}
              请求到达速率持续高于处理速率。

              估算 (假设平均 output 500 tokens):
              - 到达速率: {{ $value | humanize }} req/s
              - 处理能力: throughput / 500 tokens ≈ X req/s

              如果持续，队列将无限增长:
              - 等待时间线性增加
              - 最终触发 timeout 和 rejection

              容量规划建议:
              - 至少需要增加 {{ printf "%.0f" (divf (subf $value 1) 1) }} 个同等实例
              - 或提升单实例效率 (优化 batch / prefix cache)
            runbook_url: "https://wiki.internal/runbooks/capacity-insufficient"

    # =========================================================
    # Group 3: 延迟趋势预测
    # =========================================================
    - name: capacity.latency_forecast
      interval: 60s
      rules:
        # ---------------------------------------------------------
        # TTFT 持续恶化趋势
        # ---------------------------------------------------------
        - alert: TTFTDegradingTrend
          expr: |
            deriv(
              histogram_quantile(0.99,
                sum by (le) (rate(vllm:time_to_first_token_seconds_bucket[5m]))
              )[30m:]
            ) > 0.01
          for: 15m
          labels:
            severity: warning
            team: ml-platform
            category: capacity-latency
          annotations:
            summary: "TTFT P99 持续恶化: +{{ $value | humanize }}s/s"
            description: |
              TTFT P99 在过去 30 分钟持续增长。
              增长率: {{ $value | humanize }} 秒/秒

              预计:
              - 如果趋势持续，30 分钟后 TTFT P99 将增加 {{ printf "%.1f" (mulf $value 1800) }}s
              - 可能很快突破 SLO 阈值 (5s)

              根因定位:
              1. 检查 gpu_cache_usage_perc 趋势 — 是否同步增长
              2. 检查 num_requests_waiting 趋势 — 排队是否增长
              3. 检查 prefix_cache_hit_rate — 是否在下降
              4. 检查请求 prompt 长度分布 — 是否有更多长 prompt
            runbook_url: "https://wiki.internal/runbooks/ttft-degrading"

        # ---------------------------------------------------------
        # TTFT P50 快速恶化 (影响大多数用户)
        # ---------------------------------------------------------
        - alert: TTFTP50Rising
          expr: |
            histogram_quantile(0.50,
              sum by (le) (rate(vllm:time_to_first_token_seconds_bucket[5m]))
            ) > 2
          for: 5m
          labels:
            severity: warning
            team: ml-platform
            category: capacity-latency
          annotations:
            summary: "TTFT P50 > 2s — 多数用户体验受影响"
            description: |
              TTFT 中位数 > 2 秒，意味着超过 50% 的用户
              需要等待 2 秒以上才能看到第一个字。

              P50 恶化 (而非只是 P99) 说明问题不是尾部异常，
              而是系统性的容量不足。

              紧急扩容指标:
              - 如果 P50 > 2s 且 gpu_cache > 0.9 → 必须扩容
              - 如果 P50 > 2s 但 gpu_cache < 0.7 → 检查 prompt 长度变化
            impact: "多数用户体验恶化，而非只有长尾用户"
            runbook_url: "https://wiki.internal/runbooks/ttft-p50-high"

    # =========================================================
    # Group 4: 资源使用率趋势
    # =========================================================
    - name: capacity.resource_forecast
      interval: 60s
      rules:
        # ---------------------------------------------------------
        # GPU 集群整体利用率过高 — 无扩缩余量
        # ---------------------------------------------------------
        - alert: ClusterGPUUtilizationHigh
          expr: |
            avg(DCGM_FI_PROF_SM_ACTIVE) > 0.85
          for: 30m
          labels:
            severity: warning
            team: ml-platform
            category: capacity-resource
          annotations:
            summary: "集群 GPU SM Active 均值 > 85% 持续 30 分钟"
            description: |
              集群平均 GPU SM Active: {{ $value | humanizePercentage }}

              当集群整体利用率 > 85%:
              - 没有余量应对突发流量
              - 任何实例故障都会导致剩余实例过载
              - Preemption 和排队概率大幅增加

              容量规划建议:
              - 维持集群利用率在 70% 以下 (留 30% buffer)
              - 当 > 80% 时应启动扩容流程
              - 评估是否需要预留 Spot/Reserved 实例

              N+1 冗余计算:
              - 当前实例数: N
              - 如果 1 个实例故障，剩余利用率 =
                current_util × N / (N-1)
              - 需要确保 N-1 个实例能承受 100% 流量
            runbook_url: "https://wiki.internal/runbooks/cluster-utilization-high"

        # ---------------------------------------------------------
        # 单实例长期过载 — 负载不均衡
        # ---------------------------------------------------------
        - alert: InstanceOverloaded
          expr: |
            vllm:gpu_cache_usage_perc > 0.9
            AND
            avg without(instance) (vllm:gpu_cache_usage_perc) < 0.7
          for: 15m
          labels:
            severity: warning
            team: ml-platform
            category: capacity-balance
          annotations:
            summary: "实例 {{ $labels.instance }} 过载但集群均值正常"
            description: |
              实例 {{ $labels.instance }} KV Cache > 90%
              但集群平均 KV Cache < 70%

              这说明负载分配不均衡:
              - 负载均衡策略可能有问题
              - 某些请求模式集中到特定实例
              - Session affinity 导致热点

              建议:
              1. 检查负载均衡策略 (Round Robin vs Least Connection)
              2. 考虑基于 KV Cache 使用率的智能路由
              3. 检查是否有 sticky session 配置
            runbook_url: "https://wiki.internal/runbooks/instance-overloaded"

    # =========================================================
    # Group 5: 业务增长容量预警
    # =========================================================
    - name: capacity.business_growth
      interval: 300s  # 5 分钟间隔（长期趋势不需要高频）
      rules:
        # ---------------------------------------------------------
        # 日请求量周环比增长 > 30%
        # ---------------------------------------------------------
        - alert: RequestVolumeGrowthHigh
          expr: |
            (
              sum(increase(vllm:request_success_total[1d]))
              /
              sum(increase(vllm:request_success_total[1d] offset 7d))
            ) > 1.3
          for: 0s
          labels:
            severity: info
            team: ml-platform
            category: capacity-growth
          annotations:
            summary: "日请求量周环比增长 > 30%"
            description: |
              请求量较上周同期增长超过 30%。

              增长率: {{ $value | humanizePercentage }}

              容量评估:
              - 当前集群能否承受持续增长?
              - 按此速度，{{ printf "%.0f" (divf 0.85 (subf $value 1)) }} 周后将达到容量上限
              - 是否需要提前采购 GPU / 申请云资源?

              建议:
              1. 评估增长是暂时性还是趋势性
              2. 制定 2 周内的扩容计划
              3. 考虑成本优化 (Spot Instance 补充容量)
              4. 评估模型优化空间 (量化/蒸馏降低资源需求)
            runbook_url: "https://wiki.internal/runbooks/capacity-growth-plan"

        # ---------------------------------------------------------
        # 峰值请求量接近集群极限
        # 集群极限估算: 实例数 × 单实例 max_throughput
        # ---------------------------------------------------------
        - alert: PeakTrafficNearCapacity
          expr: |
            max_over_time(
              sum(rate(vllm:generation_tokens_total[5m]))[1h:]
            )
            > 0.8 * sum(vllm:avg_generation_throughput_toks_per_s)
          for: 0s
          labels:
            severity: warning
            team: ml-platform
            category: capacity-peak
          annotations:
            summary: "过去 1 小时峰值流量达集群能力 80%"
            description: |
              峰值吞吐已接近集群最大处理能力。

              集群能力上限 ≈ 所有实例 avg_throughput 之和
              峰值 / 上限 > 80%

              风险:
              - 下一次流量尖峰可能导致排队和降级
              - 没有足够 buffer 应对突发
              - 如有实例故障，立即过载

              建议:
              - 保持峰值/容量比 < 70%
              - 配置 HPA 在 > 70% 时自动扩容
              - 准备降级策略 (限流 / 缩短 max_tokens)
            runbook_url: "https://wiki.internal/runbooks/peak-near-capacity"

    # =========================================================
    # Group 6: 成本效率告警
    # =========================================================
    - name: capacity.cost_efficiency
      interval: 300s
      rules:
        # ---------------------------------------------------------
        # GPU 长时间闲置 — 浪费成本
        # ---------------------------------------------------------
        - alert: GPUIdleWasteDetected
          expr: |
            avg_over_time(DCGM_FI_PROF_SM_ACTIVE[1h]) < 0.1
            AND
            ON(instance) count(vllm:num_requests_running == 0) > 0
          for: 1h
          labels:
            severity: info
            team: ml-platform
            category: cost-efficiency
          annotations:
            summary: "GPU 闲置 > 1小时: SM Active < 10%"
            description: |
              实例 {{ $labels.instance }} GPU 过去 1 小时平均利用率 < 10%。

              成本计算 (H20 按需):
              - ~$4/GPU/h × 8 GPUs = ~$32/h 被浪费
              - 如果闲置 8 小时/天 = ~$256/天 = ~$7,680/月

              建议:
              1. 配置 scale-to-zero (无请求时缩容)
              2. 在闲置时段运行 batch 推理任务
              3. 使用 Spot Instance 替代长期闲置的 On-Demand
              4. 调整实例数匹配实际负载曲线
            runbook_url: "https://wiki.internal/runbooks/gpu-idle-cost"

        # ---------------------------------------------------------
        # Tokens/GPU-Hour 效率低
        # ---------------------------------------------------------
        - alert: LowTokensPerGPUHour
          expr: |
            sum by (instance) (rate(vllm:generation_tokens_total[1h])) * 3600
            < 500000
            AND
            sum by (instance) (vllm:num_requests_running) > 5
          for: 1h
          labels:
            severity: info
            team: ml-platform
            category: cost-efficiency
          annotations:
            summary: "Tokens/GPU-Hour < 500K (有负载但效率低)"
            description: |
              实例 {{ $labels.instance }}
              Tokens/GPU-Hour: {{ $value | humanize }}
              有 > 5 个活跃请求但产出偏低。

              正常基线 (8×H20 + Qwen2.5-72B):
              - 高效: > 2M tokens/GPU-hour
              - 正常: 1-2M tokens/GPU-hour
              - 低效: < 500K tokens/GPU-hour

              低效可能原因:
              - 大量短请求 (overhead 比例高)
              - Preemption 严重 (重复计算浪费)
              - Prefix cache 未启用或命中率低
              - Batch 调度不够高效

              优化建议:
              - 开启 chunked prefill 优化调度
              - 开启 prefix caching
              - 合并短请求 (如果业务允许)
              - 检查是否有生成长度为 0 的无效请求
            runbook_url: "https://wiki.internal/runbooks/low-efficiency"
