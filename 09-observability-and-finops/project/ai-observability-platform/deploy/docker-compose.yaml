# AI Observability Platform - Docker Compose 部署配置
#
# 服务:
#   - observability-platform: 监控平台 API (FastAPI)
#   - prometheus: 指标存储与查询
#   - grafana: 可视化仪表盘
#
# 使用方式:
#   docker-compose up -d
#   访问: http://localhost:8080 (API), http://localhost:3000 (Grafana)

version: "3.8"

services:
  # ────────────────── 监控平台 API ──────────────────
  observability-platform:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: ai-observability-api
    ports:
      - "8080:8080"
    environment:
      - PYTHONPATH=/app
      - PROMETHEUS_URL=http://prometheus:9090
      - LISTEN_PORT=8080
      - LOG_LEVEL=INFO
    depends_on:
      - prometheus
    networks:
      - observability-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ────────────────── Prometheus ──────────────────
  prometheus:
    image: prom/prometheus:v2.50.0
    container_name: ai-observability-prometheus
    ports:
      - "9090:9090"
    volumes:
      - prometheus-data:/prometheus
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--web.enable-lifecycle"
      - "--web.enable-admin-api"
    networks:
      - observability-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ────────────────── Grafana ──────────────────
  grafana:
    image: grafana/grafana:10.3.0
    container_name: ai-observability-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - observability-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

# ────────────────── 网络 ──────────────────
networks:
  observability-net:
    driver: bridge
    name: ai-observability-network

# ────────────────── 持久化卷 ──────────────────
volumes:
  prometheus-data:
    name: ai-observability-prometheus-data
  grafana-data:
    name: ai-observability-grafana-data
