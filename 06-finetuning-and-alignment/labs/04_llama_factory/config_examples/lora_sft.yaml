# ========================================
# Qwen2-7B LoRA SFT 配置
# 适用于: 单卡 H20 (96GB)
# ========================================

### Model
model_name_or_path: Qwen/Qwen2-7B
trust_remote_code: true

### Method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 64
lora_alpha: 128
lora_target: all
lora_dropout: 0.05

### Dataset
dataset: my_sft_data         # 在 dataset_info.json 中注册
template: qwen
cutoff_len: 2048
overwrite_cache: true
preprocessing_num_workers: 16

### Output
output_dir: outputs/qwen2-7b-lora-sft
logging_steps: 10
save_steps: 500
save_total_limit: 3
overwrite_output_dir: true

### Training
per_device_train_batch_size: 4
gradient_accumulation_steps: 4
learning_rate: 2.0e-4
num_train_epochs: 3.0
lr_scheduler_type: cosine
warmup_ratio: 0.03
weight_decay: 0.01
bf16: true
gradient_checkpointing: true
flash_attn: fa2

### Eval
val_size: 0.05
per_device_eval_batch_size: 8
eval_strategy: steps
eval_steps: 500
