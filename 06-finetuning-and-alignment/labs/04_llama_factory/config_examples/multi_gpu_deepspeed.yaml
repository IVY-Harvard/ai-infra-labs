# ========================================
# 多卡 DeepSpeed ZeRO-2 + LoRA 配置
# 适用于: 4-8 × H20, 大模型 LoRA 微调
# ========================================

### Model
model_name_or_path: Qwen/Qwen2-72B
trust_remote_code: true

### Method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 64
lora_alpha: 128
lora_target: all
lora_dropout: 0.05

### Dataset
dataset: my_sft_data
template: qwen
cutoff_len: 2048
preprocessing_num_workers: 16

### Output
output_dir: outputs/qwen2-72b-lora
logging_steps: 10
save_steps: 200
overwrite_output_dir: true

### Training
per_device_train_batch_size: 2
gradient_accumulation_steps: 8
learning_rate: 1.0e-4
num_train_epochs: 2.0
lr_scheduler_type: cosine
warmup_ratio: 0.03
bf16: true
gradient_checkpointing: true

### DeepSpeed
deepspeed: examples/deepspeed/ds_z2_config.json

# 启动命令:
# accelerate launch --num_processes 8 \
#   -m llamafactory.launcher train config_examples/multi_gpu_deepspeed.yaml
