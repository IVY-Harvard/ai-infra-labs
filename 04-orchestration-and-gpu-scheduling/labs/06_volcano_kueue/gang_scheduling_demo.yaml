---
# 使用 VCJob 简化上述定义（推荐方式）
apiVersion: batch.volcano.sh/v1alpha1
kind: Job
metadata:
  name: gang-training-vcjob
spec:
  schedulerName: volcano
  queue: training-queue
  minAvailable: 4            # Gang: 至少 4 个才调度
  maxRetry: 3
  ttlSecondsAfterFinished: 3600
  plugins:
    env: []                  # 自动注入 VK_TASK_INDEX
    svc: []                  # 自动创建 DNS
  policies:
  - event: PodEvicted
    action: RestartJob       # 任一 Pod 被驱逐 → 重启整个 Job
  - event: PodFailed
    action: RestartJob
  tasks:
  - replicas: 4
    name: worker
    policies:
    - event: TaskCompleted
      action: CompleteJob    # 所有 worker 完成 → Job 完成
    template:
      spec:
        containers:
        - name: trainer
          image: pytorch-training:latest
          command:
          - torchrun
          - --nproc_per_node=2
          - --nnodes=4
          - --node_rank=$(VK_TASK_INDEX)
          - --master_addr=$(worker-0.gang-training-vcjob)
          - --master_port=29400
          - train.py
          resources:
            limits:
              nvidia.com/gpu: 2
              cpu: "8"
              memory: "64Gi"
        restartPolicy: OnFailure
