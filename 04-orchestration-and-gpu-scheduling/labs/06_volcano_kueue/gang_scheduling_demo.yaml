# Volcano Gang Scheduling 演示
#
# Gang Scheduling 确保分布式训练的所有 worker 要么全部调度成功，
# 要么全部不调度。避免"部分调度"导致的资源死锁。
#
# 场景：4-worker 分布式训练，每个 worker 需要 2 GPU
# 集群：8x H20 GPU
# 如果没有 Gang Scheduling：可能只调度了 2 个 worker，
#   剩下的等待资源 → 2 个已调度的 worker 也在空等 → 死锁

---
# PodGroup 定义（Gang Scheduling 的核心）
apiVersion: scheduling.volcano.sh/v1beta1
kind: PodGroup
metadata:
  name: training-gang
spec:
  minMember: 4         # 至少 4 个 Pod 才开始调度
  queue: training-queue
  minResources:
    nvidia.com/gpu: "8"   # 总共需要 8 GPU
    cpu: "32"
    memory: "256Gi"

---
# Worker 0 (Master)
apiVersion: v1
kind: Pod
metadata:
  name: training-worker-0
  annotations:
    scheduling.volcano.sh/group-name: training-gang
  labels:
    job-name: distributed-training
    role: worker
spec:
  schedulerName: volcano
  containers:
  - name: trainer
    image: pytorch-training:latest
    command:
    - torchrun
    - --nproc_per_node=2
    - --nnodes=4
    - --node_rank=0
    - --master_addr=training-worker-0
    - --master_port=29400
    - train.py
    - --checkpoint-dir=/checkpoints
    ports:
    - containerPort: 29400
      name: master-port
    resources:
      limits:
        nvidia.com/gpu: 2
        cpu: "8"
        memory: "64Gi"
    volumeMounts:
    - name: checkpoint-vol
      mountPath: /checkpoints
    - name: dataset-vol
      mountPath: /data
  volumes:
  - name: checkpoint-vol
    persistentVolumeClaim:
      claimName: training-checkpoints
  - name: dataset-vol
    persistentVolumeClaim:
      claimName: training-dataset
  restartPolicy: Never

