# SR-IOV Network Operator - NetworkAttachmentDefinition
# Provides direct hardware NIC access to pods via Virtual Functions
---
apiVersion: sriovnetwork.openshift.io/v1
kind: SriovNetworkNodePolicy
metadata:
  name: mlnx-rdma-policy
  namespace: sriov-network-operator
spec:
  nodeSelector:
    feature.node.kubernetes.io/network-sriov.capable: "true"
  resourceName: mlnx_rdma_vf
  numVfs: 8
  nicSelector:
    vendor: "15b3"          # Mellanox
    deviceID: "101b"        # ConnectX-6
    rootDevices:
      - "0000:3b:00.0"
  deviceType: netdevice
  isRdma: true
  linkType: ETH             # ETH for RoCE, IB for InfiniBand
---
apiVersion: sriovnetwork.openshift.io/v1
kind: SriovNetwork
metadata:
  name: rdma-net
  namespace: sriov-network-operator
spec:
  resourceName: mlnx_rdma_vf
  networkNamespace: default
  ipam: |
    {
      "type": "host-local",
      "subnet": "192.168.100.0/24",
      "rangeStart": "192.168.100.10",
      "rangeEnd": "192.168.100.200"
    }
  capabilities: '{ "rdma": true }'
---
# Resulting NetworkAttachmentDefinition (auto-generated by operator)
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: rdma-net
  namespace: default
  annotations:
    k8s.v1.cni.cncf.io/resourceName: openshift.io/mlnx_rdma_vf
spec:
  config: |
    {
      "cniVersion": "0.3.1",
      "name": "rdma-net",
      "type": "sriov",
      "vlan": 100,
      "spoofchk": "on",
      "trust": "on",
      "ipam": {
        "type": "host-local",
        "subnet": "192.168.100.0/24"
      }
    }
